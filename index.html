<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmoothOS</title>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>
  <!-- Animated gradient desktop -->
  <div id="desktop">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>

    <!-- Desktop icons -->
    <div id="desktop-icons">
      <button class="desktop-icon" data-open="aimtrainer" title="Aim Trainer">
        <span class="icon-tile">
          <svg viewBox="0 0 48 48" width="38" height="38" aria-hidden="true">
            <circle cx="24" cy="24" r="18" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
            <circle cx="24" cy="24" r="11" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.6"/>
            <circle cx="24" cy="24" r="4" fill="#ff5f6d"/>
            <line x1="24" y1="2"  x2="24" y2="11" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="24" y1="37" x2="24" y2="46" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="2"  y1="24" x2="11" y2="24" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="37" y1="24" x2="46" y2="24" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="icon-label">Aim Trainer</span>
      </button>
      <button class="desktop-icon" data-open="settings" title="Settings">
        <span class="icon-tile">
          <svg viewBox="0 0 48 48" width="38" height="38" aria-hidden="true">
            <circle cx="24" cy="24" r="20" fill="red" stroke="#fff"
            stroke-width="4" opacity="1"/>
          </svg>
        </span>
      </button>
    </div>

    <!-- Welcome window -->
    <div class="window" id="welcome" data-title="Welcome" style="top: calc(50% - 150px); left: calc(50% - 200px);">
      <div class="windowbody">
        <h1 class="welcome-title">SmoothOS</h1>
        <p class="welcome-sub">Drag me by the bar. Close me. Reopen from the menu.</p>
        <button class="cta" data-close>Got it</button>
      </div>
    </div>

    <!-- Aim Trainer window -->
    <div class="window" id="aimtrainer" data-title="Aim Trainer" style="top: calc(50% - 150px); left: calc(50% - 200px);">
      <div class="windowbody">
        <div class="aim-intro">
          <h1 class="aim-title">Aim Trainer</h1>
          <p class="welcome-sub">This will be an Aim Trainer for SmoothOS.</p>
          <button class="cta" id="startgame">Let's go!</button>
        </div>
      </div>
    </div>
    <!-- Settings Window -->
     <div class="window" id="settings" data-title="Settings" style="top:calc(50%-150px); left: calc(50% - 200px);">
        <div class="windowbody">
          <div class="main-menu">
            <h1 class="settings-title">Settings</h1>
            <p class="settings-info">This is the place to adjust settings.
              You can adjust the wallpaper, accent color, toggle blobs, amongst
              other things.
            </p>
          </div>
        </div>
     </div>
    <!-- Dock: chips for minimized windows -->
    <div id="dock"></div>

  </div>

  <script src="script.js"></script>
  <script src="aim.js"></script>
  <script src="settings.js"></script>
</body>
</html>
