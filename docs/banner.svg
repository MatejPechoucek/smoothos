<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="SmoothOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1f3b"/>
      <stop offset="50%" stop-color="#2c1a4d"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5f6d"/>
      <stop offset="50%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#2af598"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="20" fill="url(#bg)"/>

  <!-- floating colour blobs -->
  <circle cx="180" cy="90"  r="150" fill="#ff5f6d" opacity="0.45" filter="url(#blur)"/>
  <circle cx="1040" cy="300" r="170" fill="#2af598" opacity="0.40" filter="url(#blur)"/>
  <circle cx="720" cy="120" r="120" fill="#4facfe" opacity="0.40" filter="url(#blur)"/>

  <!-- glass window mock -->
  <g transform="translate(840,70)">
    <rect width="300" height="200" rx="16" fill="#1e1e2e" opacity="0.55" stroke="#ffffff" stroke-opacity="0.14"/>
    <rect width="300" height="34" rx="16" fill="#ffffff" opacity="0.05"/>
    <circle cx="20" cy="17" r="6" fill="#ec6b5e"/>
    <circle cx="40" cy="17" r="6" fill="#f5bf4f"/>
    <circle cx="60" cy="17" r="6" fill="#61c454"/>
    <!-- crosshair, echoing the Aim Trainer icon -->
    <g transform="translate(150,120)" stroke="#ffffff" stroke-width="3" fill="none">
      <circle r="34" opacity="0.9"/>
      <circle r="20" opacity="0.6"/>
      <circle r="6" fill="#ff5f6d" stroke="none"/>
      <line x1="0" y1="-42" x2="0" y2="-26" stroke-linecap="round"/>
      <line x1="0" y1="42"  x2="0" y2="26" stroke-linecap="round"/>
      <line x1="-42" y1="0" x2="-26" y2="0" stroke-linecap="round"/>
      <line x1="42" y1="0"  x2="26" y2="0" stroke-linecap="round"/>
    </g>
  </g>

  <text x="80" y="180" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="88" font-weight="700" fill="url(#title)" letter-spacing="-2">SmoothOS</text>
  <text x="84" y="230" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="400" fill="#ffffff" opacity="0.72">A glassmorphic web desktop. No build, no frameworks, no loading.</text>
</svg>
