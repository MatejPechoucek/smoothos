<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="SmoothOS">
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#192033"/>
      <stop offset="48%" stop-color="#39415f"/>
      <stop offset="100%" stop-color="#6b7a8f"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9d3f0"/>
      <stop offset="55%" stop-color="#a9c8bd"/>
      <stop offset="100%" stop-color="#d7b29a"/>
    </linearGradient>
    <linearGradient id="tile-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f8cc9"/>
      <stop offset="100%" stop-color="#5c8f9b"/>
    </linearGradient>
    <linearGradient id="tile-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b38395"/>
      <stop offset="100%" stop-color="#d2a583"/>
    </linearGradient>
    <linearGradient id="tile-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f7280"/>
      <stop offset="100%" stop-color="#a9d2cd"/>
    </linearGradient>
    <filter id="soft-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="58"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#101523" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#wallpaper)"/>
  <circle cx="190" cy="70" r="170" fill="#8ea0d8" opacity="0.36" filter="url(#soft-blur)"/>
  <circle cx="980" cy="300" r="190" fill="#8cb9a8" opacity="0.38" filter="url(#soft-blur)"/>
  <circle cx="750" cy="120" r="130" fill="#d1a58a" opacity="0.28" filter="url(#soft-blur)"/>

  <g transform="translate(70,92)">
    <text x="0" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="88" font-weight="750" fill="url(#title)">SmoothOS</text>
    <text x="4" y="122" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="25" fill="#f4f7fb" opacity="0.76">A calm glass desktop with real windows and live appearance controls.</text>
  </g>

  <g transform="translate(778,50)" filter="url(#shadow)">
    <rect width="330" height="250" rx="18" fill="#263054" opacity="0.66" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect width="330" height="36" rx="18" fill="#ffffff" opacity="0.06"/>
    <circle cx="22" cy="18" r="6" fill="#ec6b5e"/>
    <circle cx="42" cy="18" r="6" fill="#f5bf4f"/>
    <circle cx="62" cy="18" r="6" fill="#61c454"/>
    <text x="136" y="23" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Settings</text>

    <text x="28" y="76" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="750" fill="url(#title)">Settings</text>

    <rect x="28" y="100" width="274" height="36" rx="11" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="32" y="104" width="94" height="28" rx="9" fill="#ffffff" opacity="0.12"/>
    <rect x="32" y="130" width="94" height="2" fill="#3b82f6"/>
    <text x="47" y="123" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Appearance</text>
    <text x="146" y="123" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#ffffff" opacity="0.52">System</text>

    <rect x="28" y="154" width="274" height="70" rx="12" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="44" y="181" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Wallpaper</text>
    <rect x="44" y="192" width="38" height="22" rx="7" fill="url(#tile-a)"/>
    <rect x="90" y="192" width="38" height="22" rx="7" fill="url(#tile-b)"/>
    <rect x="136" y="192" width="38" height="22" rx="7" fill="url(#tile-c)"/>
    <rect x="182" y="192" width="38" height="22" rx="7" fill="#8a789e"/>
    <rect x="228" y="192" width="38" height="22" rx="7" fill="#8f9b72"/>

    <rect x="28" y="236" width="274" height="46" rx="12" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="44" y="263" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Wallpaper blur</text>
    <line x1="178" y1="258" x2="276" y2="258" stroke="#4e8df7" stroke-width="5" stroke-linecap="round"/>
    <circle cx="212" cy="258" r="8" fill="#ffffff"/>
  </g>
</svg>
